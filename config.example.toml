# Copy to config.toml and edit. config.toml is gitignored-by-convention (machine-local).

[run]
in_dir      = "in"
out_dir     = "out"
# Hard isolation for the most-sensitive tier: when true the process must make
# zero outbound network connections. The VLM endpoint must therefore be local.
airgap      = true
# Overlay box granularity: "line" (MVP) or "word" (subdivision follow-on).
granularity = "line"
# Font for the invisible overlay text. A Unicode TTF is required for non-Latin
# scripts (Thai/CJK/Arabic) to be searchable — base-14 fonts break search there.
# "" = auto-detect (macOS Arial Unicode / common Noto paths); else give a TTF path.
overlay_font = ""

[vlm]
# DEFAULT generalist reader. Ollama / MLX / vLLM all speak this OpenAI-compatible API,
# so the runtime is a free variable. On Apple Silicon, MLX is ~10-40x faster than
# Ollama for Qwen3-VL — serve it with:  python -m mlx_vlm.server --port 8080
base_url = "http://localhost:8080/v1"                      # mlx-vlm server
model    = "mlx-community/Qwen3-VL-8B-Instruct-4bit"
api_key  = "not-needed-locally"
# Alternatives:
# base_url = "http://localhost:11434/v1"; model = "qwen2.5vl:7b"        # Ollama
# base_url = "http://transcription-gpu.internal:8000/v1"               # in-VPC vLLM (CUDA)

# Per-script tool routing — THE TOOLKIT (see Docs/routing.md). PaddleOCR is always the
# geometry engine; paddle_lang picks its recogniser. vlm_model/vlm_base_url override
# the READER for that script (a specialist on its own endpoint). Omit a section to take
# the default generalist above. These mirror the built-in DEFAULT_ROUTES; set them here
# to point at YOUR machine's endpoints.
# [routing.thai]                                  # Thai -> Typhoon specialist on Ollama
# paddle_lang  = "th"                              # Thai recogniser -> Thai det_text -> better alignment
# vlm_model    = "scb10x/typhoon-ocr1.5-3b:latest"
# vlm_base_url = "http://localhost:11434/v1"
#
# [routing.cyrillic]
# paddle_lang = "cyrillic"
