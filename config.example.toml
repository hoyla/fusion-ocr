# Copy to config.toml and edit. config.toml is gitignored-by-convention (machine-local).

[run]
in_dir      = "in"
out_dir     = "out"
# Hard isolation for the most-sensitive tier: when true the process must make
# zero outbound network connections. The VLM endpoint must therefore be local.
airgap      = true
# Overlay box granularity: "line" (MVP) or "word" (subdivision follow-on).
granularity = "line"
# Font for the invisible overlay text. A Unicode TTF is required for non-Latin
# scripts (Thai/CJK/Arabic) to be searchable — base-14 fonts break search there.
# "" = auto-detect (macOS Arial Unicode / common Noto paths); else give a TTF path.
overlay_font = ""
# Apple Vision (macOS, on-device) as the fast deterministic engine for supported
# scripts (en/Thai/Cyrillic/Arabic/CJK). Sub-2s, no model, no server, fully sealed —
# ideal for the airgap tier and clean printed text. When a page's mean Vision
# confidence >= apple_vision_skip_vlm, the VLM read is skipped (cheap tier); harder
# pages (handwriting/degraded) still fall through / escalate to the VLM.
prefer_apple_vision = false
apple_vision_skip_vlm = 0.92
# Route detected table regions on SCANNED pages to a focused VLM table read (crop the
# region + table prompt), regardless of the page-level read — tables are structure that
# line-OCR / Apple Vision read poorly. Geometry still comes from the deterministic
# PaddleOCR grid (cell boxes + per-cell confidence); this only supplies clean cell
# content. Born-digital tables are left to the text layer (the exact text is already in
# the file — re-reading a raster with a generative model would only add error).
table_vlm_read = true
# Fusion anti-misalignment gate. Needleman-Wunsch always pairs a detected cluster with
# some VLM line; when the aligned line resembles the ink below fuse_min_sim AND the
# detector was at least fuse_det_conf_trust sure, that's misalignment (not a correction)
# so the trusted det_text is kept. Confidence-gated so the handwriting path (garbled
# det_text at low confidence, VLM is the real read) is never penalised. Both are
# surfaceable + tunable at runtime via the API (GET/PATCH /config).
fuse_min_sim = 0.34
fuse_det_conf_trust = 0.80
# Watcher: move a handled file out of in_dir (processed/ on success, failed/ on error) so the
# drop folder doesn't accumulate and get re-hashed on every scan. Loop only; --once never moves.
move_processed = true
# API ingest guard: reject an upload larger than this many MB with 413, before it's hashed.
# Default 50 leaves headroom for large image-heavy / many-page PDFs while refusing absurd
# uploads that would exhaust memory/disk; lower it if you only expect small scans.
max_upload_mb = 50
# NB: the API bearer token is read from the FUSION_OCR_API_TOKEN environment variable, never
# from this file, and the API refuses to start without it (fail closed).
# HTTP server bind address for `fusion-ocr-serve`. 127.0.0.1 = localhost only; set "0.0.0.0"
# (or a specific LAN IP) to reach the API from other machines on your network. Use an IP
# literal under airgap — a hostname would need a DNS lookup, which the seal refuses.
api_host = "127.0.0.1"
api_port = 8000
# Behind a TLS-terminating reverse proxy (nginx/Caddy — see Docs/deployment.md): trust the
# X-Forwarded-* headers (real client IP, https scheme) only from these proxy source IPs.
# 127.0.0.1 = proxy colocated on this host; widen if the proxy runs elsewhere.
forwarded_allow_ips = "127.0.0.1"

[vlm]
# DEFAULT generalist reader. Ollama / MLX / vLLM all speak this OpenAI-compatible API,
# so the runtime is a free variable. On Apple Silicon, MLX is ~10-40x faster than Ollama —
# serve it with:  python -m mlx_vlm.server --port 8080
base_url = "http://localhost:8080/v1"                      # mlx-vlm server
model    = "mlx-community/Qwen3.5-9B-MLX-4bit"             # generalist; rollback: Qwen3-VL-8B-Instruct-4bit
api_key  = "not-needed-locally"
# Alternatives:
# base_url = "http://localhost:11434/v1"; model = "qwen2.5vl:7b"        # Ollama
# base_url = "http://transcription-gpu.internal:8000/v1"               # in-VPC vLLM (CUDA)
#
# Confidence-gated escalation (optional): re-read a hard page with a stronger model
# when mean PaddleOCR confidence is low, or the primary read looks like a refusal.
# escalate_below     = 0.6
# escalation_model   = "mlx-community/Qwen3-VL-30B-A3B-Instruct-4bit"   # bigger MoE
# escalation_base_url = "http://localhost:8080/v1"
#
# Client hardening (defaults shown):
# max_tokens   = 4096   # cap reader output so a pathological page can't run to the timeout (0 = uncapped)
# max_retries  = 2      # retry transient 5xx / transport errors with backoff (AirgapError is never retried)
# jpeg_quality = 85     # page images are sent as JPEG (smaller on the wire than PNG); 1-100, lossy

# Per-script tool routing — THE TOOLKIT (see Docs/routing.md). PaddleOCR is always the
# geometry engine; paddle_lang picks its recogniser. vlm_model/vlm_base_url override
# the READER for that script (a specialist on its own endpoint). Omit a section to take
# the default generalist above. These mirror the built-in DEFAULT_ROUTES; set them here
# to point at YOUR machine's endpoints.
# [routing.thai]                                  # Thai -> Typhoon specialist (MLX)
# paddle_lang  = "th"                              # Thai recogniser -> Thai det_text -> better alignment
# vlm_model    = "mlx-community/typhoon-ocr1.5-2b-8bit"   # served by the same mlx-vlm server
# # vlm_base_url omitted -> uses [vlm] base_url (the MLX server on :8080)
#
# [routing.cyrillic]
# paddle_lang = "cyrillic"
