# Copy to config.toml and edit. config.toml is gitignored-by-convention (machine-local).

[run]
in_dir      = "in"
out_dir     = "out"
# Hard isolation for the most-sensitive tier: when true the process must make
# zero outbound network connections. The VLM endpoint must therefore be local.
airgap      = true
# Overlay box granularity: "line" (MVP) or "word" (subdivision follow-on).
granularity = "line"
# Font for the invisible overlay text. A Unicode TTF is required for non-Latin
# scripts (Thai/CJK/Arabic) to be searchable — base-14 fonts break search there.
# "" = auto-detect (macOS Arial Unicode / common Noto paths); else give a TTF path.
overlay_font = ""

[vlm]
# The one seam that moves the heavy work elsewhere later. Ollama / MLX / vLLM all
# speak this same OpenAI-compatible API, so swapping local -> transcription GPU is
# only an endpoint change.
base_url = "http://localhost:11434/v1"   # Ollama today
model    = "qwen2.5vl:7b"                 # Ollama's name has no hyphen
api_key  = "not-needed-locally"
# Later, in-VPC CUDA:
# base_url = "http://transcription-gpu.internal:8000/v1"   # vLLM

# Per-script tool routing (see Docs/routing.md). PaddleOCR is always the geometry
# engine; paddle_lang picks its recogniser. vlm_model/base_url override the reader for
# that script (a specialist). Omit a section to take the default (generalist VLM).
# [routing.thai]
# paddle_lang  = "th"                       # Thai recogniser -> Thai det_text -> better alignment
# vlm_model    = "hf.co/.../typhoon-ocr"    # Thai specialist reader, once served
# vlm_base_url = "http://localhost:11434/v1"
#
# [routing.cyrillic]
# paddle_lang = "cyrillic"
