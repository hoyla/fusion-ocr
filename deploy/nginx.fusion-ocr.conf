# nginx reverse proxy terminating TLS in front of fusion-ocr-serve.
#
# The backend (fusion-ocr-serve) binds to localhost; only nginx is exposed on the network.
# Copy to /etc/nginx/sites-available/fusion-ocr (or conf.d/), fill the <PLACEHOLDERS>,
# `nginx -t` to check, then reload. See Docs/deployment.md for the full walkthrough.

upstream fusion_ocr {
    # Must match api_port in config.toml. Keep the backend on 127.0.0.1 (api_host) so it's
    # reachable ONLY via this proxy, never directly from the network.
    server 127.0.0.1:8000;
}

# Plain HTTP -> redirect everything to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name <YOUR_HOSTNAME>;          # e.g. ocr.internal.example
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;                              # nginx < 1.25.1: drop this and use `listen 443 ssl http2;`
    server_name <YOUR_HOSTNAME>;

    ssl_certificate     <CERT_PATH>;       # fullchain.pem
    ssl_certificate_key <KEY_PATH>;        # privkey.pem
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # MUST be >= the API's max_upload_mb (default 50), or nginx returns 413 before the app
    # ever sees the upload. Keep a little headroom for multipart overhead.
    client_max_body_size 60m;

    location / {
        proxy_pass http://fusion_ocr;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;        # app learns it's really https
        proxy_set_header Authorization     $http_authorization;   # forward the bearer token

        # POST /jobs only enqueues and returns immediately (a worker drains the queue), so
        # these cover the UPLOAD, not the OCR run — modest values are fine. Bump proxy_send
        # if you accept very large PDFs over slow links.
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    60s;

        # Stream large uploads straight to the backend instead of buffering to disk first.
        proxy_request_buffering off;
    }
}
